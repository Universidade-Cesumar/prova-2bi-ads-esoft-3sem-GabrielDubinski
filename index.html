<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Controle de Almoxarifado</title>

    <!-- CSS -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <main class="container">

        <!-- Título do sistema -->
        <header>
            <h1>📦 Controle de Almoxarifado</h1>
        </header>

        <!-- Dashboard -->
        <section class="topo-dashboard">

            <div class="filtros">
                <input
                    type="text"
                    id="input-busca"
                    placeholder="🔍 Pesquisar material..."
                >
            </div>

            <div class="dashboard">
                <h3>
                    Total de itens cadastrados:
                    <span id="total-itens">0</span>
                </h3>
            </div>

        </section>

        <!-- Cadastro -->
        <section>

            <form id="form-cadastro">

                <input
                    type="text"
                    id="input-nome"
                    placeholder="📦 Nome do Material"
                    required
                >

                <input
                    type="number"
                    id="input-quantidade"
                    placeholder="📊 Quantidade"
                    min="0"
                    required
                >

                <button
                    type="submit"
                    id="btn-cadastrar"
                >
                    ➕ Cadastrar Material
                </button>

            </form>

        </section>

        <!-- Lista de materiais -->
        <section>

            <h2>📋 Lista de Materiais</h2>

            <table id="lista-materiais">

                <thead>
                    <tr>
                        <th>Nome do Material</th>
                        <th>Quantidade</th>
                        <th>Retirada</th>
                        <th>Ações</th>
                    </tr>
                </thead>

                <tbody></tbody>

            </table>

        </section>

    </main>

    <!-- JavaScript -->
    <script src="script.js"></script>

</body>

</html>
