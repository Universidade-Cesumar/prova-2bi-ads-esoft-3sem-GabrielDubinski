<body>

    <main class="container">

        <!-- Título -->
        <h1>📦 Controle de Almoxarifado</h1>

        <!-- Dashboard -->
        <section class="topo-dashboard">

            <div class="filtros">
                <input
                    type="text"
                    id="input-busca"
                    placeholder="🔍 Pesquisar material..."
                >
            </div>

            <div class="dashboard">
                <h3>
                    Total de itens cadastrados:
                    <span id="total-itens">0</span>
                </h3>
            </div>

        </section>

        <!-- Cadastro -->
        <form id="form-cadastro">

            <input
                type="text"
                id="input-nome"
                placeholder="📦 Nome do Material"
                required
            >

            <input
                type="number"
                id="input-quantidade"
                placeholder="📊 Quantidade"
                min="0"
                required
            >

            <button
                type="submit"
                id="btn-cadastrar"
            >
                ➕ Cadastrar Material
            </button>

        </form>

        <!-- Lista -->
        <section>

            <h2>📋 Lista de Materiais</h2>

            <table id="lista-materiais">

                <thead>
                    <tr>
                        <th>Nome do Material</th>
                        <th>Quantidade</th>
                        <th>Retirada</th>
                        <th>Ações</th>
                    </tr>
                </thead>

                <tbody></tbody>

            </table>

        </section>

    </main>

    <script src="script.js"></script>

</body>
