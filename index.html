<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Almoxarifado - Controle de Materiais</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>📦 Controle de Almoxarifado</h1>
        
        <form id="form-cadastro">
            <input type="text" id="input-nome" placeholder="Nome do Material" required>
            <input type="number" id="input-quantidade" placeholder="Quantidade" min="0" required>
            <button type="submit" id="btn-cadastrar">Cadastrar Material</button>
        </form>

        <h2>Lista de Materiais</h2>
        <table id="lista-materiais">
            <thead>
                <tr>
                    <th>Nome do Material</th>
                    <th>Quantidade</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script src="script.js"></script>
</body>
</html>
